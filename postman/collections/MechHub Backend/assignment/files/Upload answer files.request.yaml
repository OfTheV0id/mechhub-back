$kind: http-request
name: Upload answer files
description: |-
  图片作答/媒体上传(multipart,字段名 files,支持 png/jpg/webp/pdf)。
  返回 file 列表(id/url/name/kind/size),file id 写进 answers 的 image_keys。
  读取由 GET /api/assignment/files/:fileId(owner 或班级教师)授权。
url: "{{baseUrl}}/api/assignments/{{assignmentId}}/files"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - key: files
      type: file
      src: []
order: 1900
