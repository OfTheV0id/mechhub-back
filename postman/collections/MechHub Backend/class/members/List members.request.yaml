$kind: http-request
name: List members
description: |-
  列出班级所有成员。仅成员可调。返回顺序:owner 永远第一,其他按加入时间升序。
  扁平响应,每条字段:`user_id` / `name` / `email` / `role` / `avatar_url` / `joined_at`。
  `role` 是用户账号角色,没有「班内角色」的概念。前端用
  `member.user_id === class.owner_user_id` 判断是否是 owner。
url: "{{baseUrl}}/api/classes/{{classId}}/members"
method: GET
headers:
  Accept: application/json
order: 3100
