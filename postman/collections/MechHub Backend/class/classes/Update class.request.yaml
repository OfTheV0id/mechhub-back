$kind: http-request
name: Update class
description: |-
  更新班级信息(部分更新)。仅 owner 可调。至少提供一个字段
  (`name` / `description`)。
url: "{{baseUrl}}/api/classes/{{classId}}"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "高等数学 2026 春(改名后)",
      "description": "新描述"
    }
order: 1400
