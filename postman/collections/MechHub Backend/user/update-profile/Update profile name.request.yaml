$kind: http-request
name: Update profile name
description: Updates the display name of the current user and returns the refreshed `userdata`. `name` is trimmed and must be 1-50 characters.
url: "{{baseUrl}}/api/user/update-profile"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "chendaile"
    }
order: 1500
