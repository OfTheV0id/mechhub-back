$kind: http-request
name: Change password
description: >-
  Updates the password after verifying the old one. All sessions for
  this user — including the one making this request — are dropped on
  success, so you must log in again afterwards.
url: "{{baseUrl}}/api/user/change-password"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "old_password": "{{password}}",
      "new_password": "{{newPassword}}"
    }
order: 2000
