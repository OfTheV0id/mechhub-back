$kind: http-request
name: Create grading task
description: >-
  Create a grading task with one or more attachment images. The task
  runs asynchronously; this endpoint streams back NDJSON events for
  the initial steps (user_input, grading_start, optionally
  conversation_title) and returns. Subscribe to
  `/grading-tasks/{id}/events` for progress.


  `attachments` is an array of file IDs previously uploaded via
  `/solochat/attachments`.
url: "{{baseUrl}}/api/solochat/conversations/{{conversationId}}/grading-tasks"
method: POST
headers:
  Content-Type: application/json
  Accept: application/x-ndjson
body:
  type: json
  content: |-
    {
      "prompt_text": "请批改这道数学题",
      "attachments": ["{{attachmentId}}"]
    }
order: 4100
