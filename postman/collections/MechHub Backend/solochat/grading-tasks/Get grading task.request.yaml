$kind: http-request
name: Get grading task
description: >-
  Get a grading task's final state plus all annotations. Annotations
  populate as the agent emits structured grading results — currently
  the agent only emits text + score summary, so the annotations
  array may be empty until the agent SSE protocol is extended.
url: "{{baseUrl}}/api/solochat/grading-tasks/{{taskId}}"
method: GET
headers:
  Accept: application/json
order: 4200
