      data: {"type":"text_delta","message_id":"msg_85c822cc-889","delta":"**: 对你上传的图片进行文字识别，返回图片的页数、字数、是否包含公式以及前 200 字的预览。完整的 OCR JSON 会自动缓存到本次 session。\n    *   **何时使用"}

      data: {"type":"text_delta","message_id":"msg_85c822cc-889","delta":"**: 当你只想识别图片中的文字内容时；或者作为下一步批改的前置步骤。\n\n2.  **作业批改 (grade_with_ocr)**:\n    *   **功能**: 对一批作业图片做完整批改，返回结构化的整体得分、每页步骤分析与错误更正。"}

