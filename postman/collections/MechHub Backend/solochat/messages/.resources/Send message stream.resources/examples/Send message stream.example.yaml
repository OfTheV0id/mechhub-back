      data: {"type":"text_complete","message_id":"msg_85c822cc-889","text":"我可以使用以下两个工具(必须按顺序调用)来帮助你：\n\n1.  **OCR 文字识别 (ocr_images_cached)**:\n    *   **功能**: 对你上传的图片进行文字识别，返回图片的页数、字数、是否包含公式以及前 200 字的预览。完整的 OCR JSON 会自动缓存到本次 session。\n    *   **何时使用**: 当你只想识别图片中的文字内容时；或者作为下一步批改的前置步骤。\n\n2.  **作业批改 (grade_with_ocr)**:\n    *   **功能**: 对一批作业图片做完整批改，返回结构化的整体得分、每页步骤分析与错误更正。\n    *   **前置条件**: 必须先对同一批 image_paths 调用过 ocr_images_cached（本工具只读 session 缓存，不会自己 OCR）。\n    *   **何时使用**: 当你上传了作业图片，希望我进行批改、查看分数或找出错误时——先 OCR 再批改，两次 image_paths 必须完全一致。\n\n请告诉我你需要哪种帮助！"}

