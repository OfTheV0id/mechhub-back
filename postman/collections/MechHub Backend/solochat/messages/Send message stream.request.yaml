$kind: http-request
name: Send message stream
description: >-
  Send a user message to a conversation. Responds with
  `application/x-ndjson` вЂ” one JSON event per line.


  ## NDJSON event types


  - `user_input`         вЂ” user message just stored (with `attachments[]`)
  - `message_start`      вЂ” assistant turn begins (`message_id`, `model`)
  - `reasoning_delta`    вЂ” model's thinking trace, streamed token by token
  - `text_delta`         вЂ” assistant text chunk
  - `text_complete`      вЂ” text block finished (`text` is the full final text)
  - `tool_call_start`    вЂ” agent decided to invoke a tool (`tool_use_id`, `name`, `input` JSON)
  - `tool_result`        вЂ” tool returned (`tool_use_id`, `output` JSON, `is_error`, `elapsed_ms`)
  - `conversation_title` вЂ” only on the very first message (auto-named)
  - `error`              вЂ” agent or backend error
  - `message_done`       вЂ” assistant turn ended (`finish_reason`)


  Typical sequence for an answer that uses a tool:
  ```
  user_input в†’ message_start в†’ reasoning_delta* в†’ tool_call_start
    в†’ tool_result в†’ text_delta* в†’ text_complete в†’ message_done
  ```


  Postman renders NDJSON line-by-line in the response body.
