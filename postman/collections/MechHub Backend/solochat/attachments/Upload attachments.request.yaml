$kind: http-request
name: Upload attachments
description: >-
  Upload 1-4 files in one multipart form. Field name: `files` (can
  repeat). Allowed MIME: image/png|jpeg|webp|gif, text/plain,
  application/pdf. Max single file size = `SOLOCHAT_MAX_FILE_SIZE_BYTES`
  (default 20 MiB).


  Response returns the uploaded file metadata including the public
  URL. Pass the IDs in `attachments` of the next Send Message Stream
  call.


  In Postman: Body tab → form-data → key `files` type File → add up
  to 4 rows.
url: "{{baseUrl}}/api/solochat/attachments"
method: POST
headers:
  Accept: application/json
order: 3000
