$kind: http-request
name: Upload attachments
description: >-
  Upload 1-N files in one multipart form. Field name: `files` (can
  repeat). Allowed MIME: image/png|jpeg|webp|gif, text/plain,
  text/markdown, application/pdf. Max single file size =
  `SOLOCHAT_MAX_FILE_SIZE_BYTES` (default 20 MiB).


  Response returns the uploaded file metadata including the public
  URL. Pass the IDs in `attachments` of the next Send Message Stream
  call.


  The Python agent receives all of these (not just images); it decides
  which tool to invoke based on user intent and content.
url: "{{baseUrl}}/api/solochat/attachments"
method: POST
headers:
  Accept: application/json
order: 3000
