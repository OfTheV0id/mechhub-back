$kind: http-request
name: Create conversation
description: |-
  Create a new conversation. Body is ignored; the conversation is always created with title `"新对话"`.

  The title is auto-generated by the root LLM after the first AI reply (a `conversation_title` SSE frame is emitted on the `/messages/stream` for that first message). Rename via `PUT /api/solochat/conversations/:id`.
url: "{{baseUrl}}/api/solochat/conversations"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: "{}"
order: 1100
