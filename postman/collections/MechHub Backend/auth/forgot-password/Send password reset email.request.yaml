$kind: http-request
name: Send password reset email
description: "Always returns 200 regardless of whether the email exists, to prevent enumeration. If the user is found, any old reset tokens are deleted, a new one is created (`kind: reset`, TTL 30m), and an email is sent."
url: "{{baseUrl}}/api/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "ahowevesybleberg@gmail.com"
    }
order: 5000
