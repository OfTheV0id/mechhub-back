$kind: collection
description: >-
  MechHub backend (Go + Gin + MongoDB). Session-based auth via the
  `session_id` cookie set after `/api/auth/login`.


  Flow for full local test:


  1. Register as student → check mailbox or `db.tokens` for the verify token,
     paste into the `verifyToken` variable. Register as teacher → admin receives
     an approval email.

  2. Student verification → call Verify Email. Teacher approval → check admin
     mailbox or `db.tokens` for the `teacher_approval` token, paste into the
     `teacherApprovalToken` variable.

  3. Login → Postman cookie jar stores `session_id` automatically.

  4. Authenticated requests (Me, Change Password) reuse that cookie.

  5. Forgot Password → grab reset token the same way → Reset Password.


  All password fields require min length 8.
variables:
  baseUrl: http://localhost:8080
  email: test@example.com
  password: abcd1234
  newPassword: xyz98765
  name: Test User
  role: student
  newName: Updated Name
  verifyToken: ""
  teacherApprovalToken: ""
  resetToken: ""
  googleReturnURL: http://localhost:5173
  googleAuthCode: ""
  googleAuthState: ""
  conversationId: ""
